<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>XM25 系統技術訓練 - 實戰模擬 (180題旗艦版)</title>
    <style>
        :root {
            --bg-color: #111827;
            --card-bg: #1f2937;
            --text-main: #f9fafb;
            --text-muted: #9ca3af;
            --primary: #3b82f6;
            --primary-hover: #2563eb;
            --success: #10b981;
            --warning: #f59e0b;
            --danger: #ef4444;
            --beginner: #4ade80;
            --intermediate: #facc15;
            --advanced: #f87171;
            --border: #374151;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', sans-serif; }
        body { background-color: var(--bg-color); color: var(--text-main); line-height: 1.6; display: flex; justify-content: center; align-items: center; min-height: 100vh; padding: 20px; }
        #app-container { width: 100%; max-width: 800px; background-color: var(--card-bg); border-radius: 12px; box-shadow: 0 10px 25px rgba(0,0,0,0.5); overflow: hidden; position: relative; }
        
        .screen { display: none; padding: 30px; animation: fadeIn 0.4s ease; }
        .screen.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .game-header { display: flex; justify-content: space-between; align-items: center; padding-bottom: 15px; border-bottom: 1px solid var(--border); margin-bottom: 20px; }
        .stage-badge { padding: 5px 12px; border-radius: 20px; font-weight: bold; font-size: 0.9rem; color: #000; }
        .score-display { font-size: 1.1rem; font-weight: bold; color: var(--primary); }
        .progress-container { width: 100%; height: 8px; background-color: var(--border); border-radius: 4px; margin-bottom: 20px; overflow: hidden; }
        .progress-bar { height: 100%; background-color: var(--primary); width: 0%; transition: width 0.3s ease; }

        .scene-container { background-color: rgba(0,0,0,0.2); padding: 20px; border-radius: 8px; border-left: 4px solid var(--primary); margin-bottom: 25px; font-size: 1.1rem; }
        .choices-container { display: flex; flex-direction: column; gap: 12px; }
        .choice-btn { background-color: var(--border); color: var(--text-main); border: 2px solid transparent; padding: 15px 20px; border-radius: 8px; font-size: 1rem; cursor: pointer; text-align: left; transition: all 0.2s; }
        .choice-btn:hover:not(:disabled) { background-color: #4b5563; border-color: var(--primary); }
        .choice-btn:disabled { cursor: not-allowed; opacity: 0.6; }
        .choice-btn.correct { background-color: rgba(16, 185, 129, 0.2); border-color: var(--success); color: var(--success); opacity: 1; }
        .choice-btn.wrong { background-color: rgba(239, 68, 68, 0.2); border-color: var(--danger); color: var(--danger); }

        .feedback-container { margin-top: 25px; padding: 20px; border-radius: 8px; display: none; }
        .feedback-container.show { display: block; animation: fadeIn 0.3s ease; }
        .feedback-container.hint { background-color: rgba(245, 158, 11, 0.1); border: 1px solid var(--warning); }
        .feedback-container.success { background-color: rgba(16, 185, 129, 0.1); border: 1px solid var(--success); }
        .feedback-container.fail { background-color: rgba(239, 68, 68, 0.1); border: 1px solid var(--danger); }
        .knowledge-summary { margin-top: 15px; padding-top: 15px; border-top: 1px dashed rgba(255,255,255,0.2); font-size: 0.95rem; color: #d1d5db; }
        
        .continue-btn { margin-top: 20px; background-color: var(--primary); color: white; border: none; padding: 10px 25px; border-radius: 6px; font-size: 1rem; cursor: pointer; float: right; transition: background 0.2s; }
        .continue-btn:hover { background-color: var(--primary-hover); }
        .clearfix { clear: both; }

        .end-header { text-align: center; margin-bottom: 30px; }
        .end-header h1 { color: var(--success); margin-bottom: 10px;}
        .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 30px; }
        .stat-box { background-color: rgba(0,0,0,0.2); padding: 15px; border-radius: 8px; text-align: center; }
        .stat-box .value { font-size: 1.5rem; font-weight: bold; color: var(--primary); }

        .coverage-map { margin-bottom: 30px; }
        .topic-tag { display: inline-block; padding: 4px 10px; border-radius: 12px; font-size: 0.85rem; margin: 4px; background-color: var(--border); }
        .topic-tag.covered { background-color: rgba(16, 185, 129, 0.2); border: 1px solid var(--success); color: var(--success); }
        .topic-tag.weak { background-color: rgba(245, 158, 11, 0.2); border: 1px solid var(--warning); color: var(--warning); }
        
        .review-section { background-color: rgba(0,0,0,0.2); padding: 15px; border-radius: 8px; margin-bottom: 30px; max-height: 200px; overflow-y: auto; }
        .review-item { border-left: 3px solid var(--warning); padding-left: 10px; margin-bottom: 10px; font-size: 0.9rem; }

        .btn-large { display: block; width: 100%; padding: 15px; background-color: var(--primary); color: white; text-align: center; border: none; border-radius: 8px; font-size: 1.1rem; font-weight: bold; cursor: pointer; transition: background 0.2s; }
        .btn-large:hover { background-color: var(--primary-hover); }
    </style>
</head>
<body>

<div id="app-container">
    <div id="start-screen" class="screen active">
        <h1 style="text-align: center; margin-bottom: 20px; color: var(--primary);">XM25 浸沒式電池系統<br>實戰技術特訓 (180題旗艦版)</h1>
        <p style="text-align: justify; margin-bottom: 30px; color: var(--text-muted);">
            歡迎來到技術部！這次的特訓題庫高達 180 題（包含大量擴充的進階與實戰題）。系統每次會為你隨機抽出 9 題（新手、進階、實戰各 3 題）。你可以反覆遊玩無數次，每次都會遇到不同的挑戰。準備好驗證你的手冊熟悉度了嗎？
        </p>
        <button class="btn-large" onclick="startGame()">接受任務 (開始隨機測驗)</button>
    </div>

    <div id="game-screen" class="screen">
        <div class="game-header">
            <div id="stage-indicator" class="stage-badge">🟢 新手任務</div>
            <div class="score-display">分數: <span id="score-val">0</span></div>
        </div>
        <div class="progress-container">
            <div id="progress-bar" class="progress-bar"></div>
        </div>
        
        <div class="scene-container" id="scene-text"></div>
        <div class="choices-container" id="choices-area"></div>

        <div id="feedback-area" class="feedback-container">
            <div id="feedback-title" style="font-weight: bold; margin-bottom: 5px;"></div>
            <div id="feedback-text"></div>
            <div id="knowledge-summary" class="knowledge-summary" style="display: none;"></div>
            <button class="continue-btn" id="continue-btn" onclick="nextQuestion()">繼續</button>
            <div class="clearfix"></div>
        </div>
    </div>

    <div id="end-screen" class="screen">
        <div class="end-header">
            <h1>🎉 測驗結業報告</h1>
            <p>辛苦了！讓我們來看看你本次抽題的掌握度。</p>
        </div>

        <div class="stats-grid">
            <div class="stat-box">
                <div>本次得分</div>
                <div class="value"><span id="end-score">0</span> / <span id="max-score">0</span></div>
            </div>
            <div class="stat-box">
                <div>測驗耗時</div>
                <div class="value" id="end-time">00:00</div>
            </div>
        </div>

        <div class="coverage-map">
            <h3 style="margin-bottom: 10px; font-size: 1.1rem;">📝 本局知識點覆蓋紀錄</h3>
            <div id="topic-tags-area"></div>
        </div>

        <div class="review-section" id="review-area" style="display: none;">
            <h3 style="margin-bottom: 10px; font-size: 1rem; color: var(--warning);">⚠️ 建議複習區塊 (本次答錯)</h3>
            <div id="review-content"></div>
        </div>

        <button class="btn-large" onclick="startGame()">重新抽題再戰</button>
    </div>
</div>

<script>
    /**
     * ==========================================
     * 龐大題庫 (180題：Bx30, Ix75, Ax75)
     * ==========================================
     */
    const questionDB = [];

    // 輔助函數：大量生成題目的捷徑
    function addQ(id, diff, topic, doc, scene, c1, c2, c3, f1, f2, f3, ansIdx, summary) {
        questionDB.push({
            id: id, difficulty: diff, topic: topic, docRef: doc, scene: scene,
            choices: [
                { text: c1, correct: ansIdx===1, feedback: f1 },
                { text: c2, correct: ansIdx===2, feedback: f2 },
                { text: c3, correct: ansIdx===3, feedback: f3 }
            ],
            knowledgeSummary: summary
        });
    }

    // ==========================================
    // 🟢 Beginner (新手任務) - 30題 (保留不變)
    // ==========================================
    addQ("B1", "beginner", "PPE防護", "Sec 6", "進入檢測區準備接觸高壓系統前，應穿戴何種基本防護？", "鋼頭鞋、絕緣手套(Class 0)、抗弧光眼鏡", "運動鞋、棉手套", "全套化學防護衣", "正確！防砸與絕緣是首要考量。", "無法防高壓與重物。", "無漏液時不需穿戴。", 1, "[手冊規定] 腳部防護穿著鋼頭鞋，眼部配戴抗弧光眼鏡，接觸高壓零件需配戴 Class 0 等級絕緣手套。");
    addQ("B2", "beginner", "系統定義", "Sec 1", "客戶詢問『浸沒式冷卻技術』是指什麼？", "電池外部包覆水套", "電芯直接浸泡在專用絕緣冷卻液中", "內部充滿液態氮", "傳統水冷板(Cold Plate)。", "正確！核心優勢是極致均溫與防熱失控。", "常溫下使用的是工程絕緣冷卻液。", 2, "[產品概述] 將電芯直接浸泡於高絕緣性專屬冷卻液中，提供無死角熱傳導。");
    addQ("B3", "beginner", "儲存條件", "Sec 4", "準備將模組放入倉庫長期儲存三個月，SOC應調整至多少？", "100%", "0%", "約 30%", "滿電會加速老化與增加風險。", "過放會永久損壞電芯。", "正確！這是鋰電池存放黃金法則。", 3, "[儲存規範] 長期儲存建議環境 15~35°C，SOC維持約 30%，並定期充放電維護。");
    addQ("B4", "beginner", "PPE防護", "Sec 6", "若廠房有化學冷卻液洩漏的風險，腳部防護應升級為什麼？", "一般鋼頭鞋", "化學防護鞋/靴", "絕緣靴", "鋼頭鞋無法防化學液體滲透。", "正確！暴露於化學品時必須使用。", "絕緣靴防電不防化學腐蝕。", 2, "[手冊規定] 暴露於化學品和其他液體時，應使用化學防護鞋。");
    addQ("B5", "beginner", "產品標示", "Sec 2", "電池銘牌(Nameplate)上通常不會標示哪種資訊？", "額定電壓與容量", "系統重量", "電芯內阻值", "這是基本規格，會標示。", "搬運需要知道重量，會標示。", "正確！內阻是動態檢測值，不會印在外殼上。", 3, "[銘牌資訊] 標示包含產品型號、額定電壓、容量、重量與製造年份等。");
    addQ("B6", "beginner", "儲存溫度", "Sec 4", "電池系統存放在戶外鐵皮屋，夏天溫度高達 45°C，這樣可以嗎？", "可以，電池耐高溫", "不行，應保持在 15~35°C", "只要不直射陽光就可以", "高溫會加速電池老化並增加風險。", "正確！必須存放於溫控環境。", "環境高溫同樣會影響內部。", 2, "[儲存環境] 建議環境溫度維持在 15~35°C，避免極端高溫。");
    addQ("B7", "beginner", "基礎保養", "Sec 4", "庫存中的電池放了一年都沒動過，這樣會發生什麼事？", "會自動進入永久休眠", "電壓過低導致電芯損壞", "沒事，浸沒式電池壽命很長", "電池沒有這種魔法功能。", "正確！自放電會導致過放，必須每 3~6 個月補電。", "長期不補電一定會損壞。", 2, "[維護規範] 長期儲存必須每 3~6 個月進行一次充放電循環維護。");
    addQ("B8", "beginner", "環境要求", "Sec 4", "儲存環境的濕度應該如何控制？", "越乾越好，0%最佳", "無特殊限制", "保持乾燥，避免冷凝水產生", "0%在一般環境難以達成且無必要。", "濕度過高會導致高壓端子生鏽短路。", "正確！避免溫差造成結露是重點。", 3, "[儲存規範] 儲存環境應保持乾燥通風，相對濕度應避免冷凝現象。");
    addQ("B9", "beginner", "防火知識", "Sec 11", "電池專用滅火器通常建議準備哪一種？", "水或二氧化碳滅火器", "D類金屬滅火器", "沙土", "正確！鋰離子電池初期火災可用大量水降溫或CO2滅火。", "鋰電池內部並非純金屬鋰，D類不完全適用。", "沙土只能掩蓋無法有效降溫。", 1, "[消防應變] 鋰離子電池火災建議使用大量水持續降溫，或使用二氧化碳滅火系統。");
    addQ("B10", "beginner", "系統定義", "Sec 1", "XM25 的外殼材質主要作用是什麼？", "裝飾用", "防撞擊與氣密包覆", "導電用", "工業產品外殼具備嚴格安規。", "正確！保護內部結構並防止冷卻液外洩。", "外殼通常需要接地，但主要目的不是導電。", 2, "[外殼設計] 金屬外殼提供機械強度防護，並維持系統氣密防止冷卻液洩漏。");
    addQ("B11", "beginner", "PPE防護", "Sec 6", "工作時若需打開高壓接線盒，手套要求為何？", "無要求", "一般棉手套", "絕緣手套且需檢查無破損", "非常危險！", "棉手套會導電。", "正確！使用前充氣檢查有無破洞是常識。", 3, "[手套規範] 絕緣手套使用前必須進行充氣測試，確認無肉眼不可見的微小破孔。");
    addQ("B12", "beginner", "搬運常識", "Sec 7", "電池模組可以用推車傾斜 45 度運送嗎？", "可以，方便轉彎", "不行，需保持水平", "看推車大小", "傾斜會導致內部液體壓力不均。", "正確！必須確保系統維持水平狀態。", "與推車大小無關，規範不允許。", 2, "[搬運規範] 搬運過程中必須隨時保持電池系統水平，嚴禁嚴重傾斜。");
    addQ("B13", "beginner", "外觀檢查", "Sec 8", "收到新電池，發現冷卻液接口的防塵蓋不見了，該怎麼辦？", "沒關係，接管時會清掉", "向主管回報並檢查是否有異物進入", "自己拿膠帶貼起來", "若有異物進入循環系統會造成堵塞。", "正確！接口污染是系統大忌。", "膠帶可能殘留殘膠。", 2, "[開箱檢查] 確認所有防塵蓋完整，若脫落需檢查接口內有無異物或灰塵。");
    addQ("B14", "beginner", "系統定義", "Sec 1", "BMS 的全名是什麼？", "Battery Manufacturing System", "Battery Management System", "Basic Motor System", "這不是製造系統。", "正確！電池管理系統，是大腦。", "與馬達無關。", 2, "[名詞解釋] BMS (Battery Management System) 負責監控電池狀態與安全保護。");
    addQ("B15", "beginner", "冷卻液特性", "Sec 1", "XM25 使用的冷卻液導電嗎？", "高導電", "不導電 (高絕緣)", "視溫度而定", "如果導電電池早就短路了。", "正確！浸沒式液體必須具備極高絕緣性。", "不論溫度都不應導電。", 2, "[冷卻液] 使用專屬工程絕緣液，具備高介電強度（不導電）特性。");
    addQ("B16", "beginner", "安全標示", "Sec 2", "外殼上的黃色閃電三角形標誌代表什麼？", "高壓危險", "高溫危險", "輻射危險", "正確！警告內部存在致命高壓。", "高溫通常是火焰或燙手標誌。", "輻射是三葉草標誌。", 1, "[警告標示] 黃色閃電標誌代表高壓電擊危險，未經授權禁止開啟。");
    addQ("B17", "beginner", "儲存規範", "Sec 4", "電池可以跟易燃化學溶劑放在同一個倉庫嗎？", "可以，省空間", "不行，需隔離存放", "只要不碰到就好", "萬一發生意外會引起連鎖反應。", "正確！電池儲存區應遠離易燃物與熱源。", "法規與安全不允許混合存放。", 2, "[儲存安全] 電池儲存區必須為獨立防火區劃，嚴禁與易燃/腐蝕性物質混放。");
    addQ("B18", "beginner", "防護眼鏡", "Sec 6", "為何在接高壓線時要戴抗弧光眼鏡？", "為了防紫外線", "為了防強光與金屬飛濺", "公司規定好看用的", "室內無紫外線問題。", "正確！高壓短路時的電弧極度刺眼且有高溫飛濺物。", "工安規定都是血淚換來的。", 2, "[臉部防護] 接觸高壓系統時，為防止短路電弧(Arc Flash)傷害眼睛，需配戴專用護目鏡。");
    addQ("B19", "beginner", "基本保養", "Sec 4", "清潔電池外殼時，應該使用什麼？", "高壓水槍", "強酸清潔劑", "乾燥或微濕的抹布", "會破壞氣密與電氣接口。", "會腐蝕外殼金屬。", "正確！輕柔擦拭即可。", 3, "[清潔規範] 外殼清潔僅可使用乾燥或微濕軟布，嚴禁使用高壓水柱或腐蝕性溶劑。");
    addQ("B20", "beginner", "名詞解釋", "Sec 1", "SOC (State of Charge) 代表什麼？", "電池健康度", "電池剩餘電量百分比", "電池總電壓", "健康度是 SOH。", "正確！就像手機右上角的電池趴數。", "電壓是 Voltage。", 2, "[名詞解釋] SOC 為荷電狀態，表示電池目前可用電量與總容量的比例。");
    addQ("B21", "beginner", "名詞解釋", "Sec 1", "SOH (State of Health) 代表什麼？", "電池健康度", "剩餘電量", "冷卻液健康度", "正確！用來評估電池老化程度。", "剩餘電量是 SOC。", "冷卻液沒有SOH這個專有名詞。", 1, "[名詞解釋] SOH 為電池健康狀態，隨使用時間與循環次數逐漸下降。");
    addQ("B22", "beginner", "開箱檢查", "Sec 8", "拆卸木箱包裝時，最怕不小心做什麼事？", "把說明書弄丟", "用鐵撬時刺穿電池外殼", "木屑掉到地上", "說明書可以下載。", "正確！破壞外殼氣密是致命傷。", "木屑掃掉就好。", 2, "[開箱安全] 拆除棧板與木箱時，工具嚴禁深入包裝內部，以免刺破電池外殼。");

    addQ("I36", "intermediate", "接地安裝", "Sec 8", "安裝電池箱體時，等電位接地線(Equipotential bonding)的作用為何？", "用來當作低壓電源的負極", "確保外殼與車架電位一致，當內部漏電時引導電流觸發保護", "用來防止生鏽", "低壓負極應獨立走線。", "正確！避免人體碰觸外殼與車架時產生電位差(觸電)。", "接地與防鏽無關。", 2, "[等電位接地] 電池金屬外殼必須透過專用接地編織帶與車輛底盤連接，確保等電位以防人員觸電。");

    addQ("I50", "intermediate", "BMS 狀態", "Sec 9", "當 BMS 處於 'Standby' 狀態時，高壓接觸器(Contactor)的狀態應該是？", "閉合 (Closed)，輸出高壓", "斷開 (Open)，無高壓輸出", "半開半閉", "這是 'Drive' 或 'Active' 狀態。", "正確！Standby 代表隨時準備好，但目前高壓是切斷的。", "接觸器沒有半開這種狀態。", 2, "[系統狀態] 在 Standby (待機) 模式下，BMS 已完成自檢但未收到外部高壓請求，主接觸器保持斷開(Open)。");
    addQ("I51", "intermediate", "預充失敗", "Sec 10", "上電時 BMS 報出 'Pre-charge Timeout'，可能的原因不包含哪一項？", "馬達控制器(MCU)端有嚴重漏電或短路", "預充電阻已經燒毀斷路", "雨刷沒水了", "負載端短路會把預充電流吃光，導致電壓無法上升。", "電阻斷了就沒電流過去。", "正確！這跟高壓系統完全無關。", 3, "[預充異常] 預充失敗通常肇因於：1. 負載端短路/電容過大 2. 預充繼電器失效 3. 預充電阻燒毀。");
    addQ("I52", "intermediate", "冷卻液處理", "Sec 8", "如果在施工時不小心把水滴入浸沒式冷卻液中，會造成什麼影響？", "會幫冷卻液降溫", "水分會破壞冷卻液的絕緣性，大幅增加系統漏電風險", "水分會自動蒸發，沒影響", "水不具備這種魔力。", "正確！絕緣液最怕的就是水分污染。", "電池內部是密閉的，無法蒸發逃逸。", 2, "[液體污染] 浸沒式工程液對水分極度敏感，微量水氣入侵即可大幅降低其介電強度(Dielectric Strength)導致絕緣失效。");
    addQ("I53", "intermediate", "通訊協定", "Sec 9", "SAE J1939 是商用車常用的通訊協定，它是建構在哪種實體層之上？", "乙太網路 (Ethernet)", "CAN Bus", "藍牙 (Bluetooth)", "車用乙太網通常用於更高帶寬需求。", "正確！J1939 就是基於 250k 或 500k 的 CAN 實體層。", "藍牙是不穩定的無線通訊。", 2, "[通訊標準] 商用車界廣泛使用的 SAE J1939 協定，其底層硬體實體層即為標準的 CAN Bus 網路。");
    addQ("I54", "intermediate", "電芯平衡", "Sec 9", "BMS 執行的「被動平衡(Passive Balancing)」其原理為何？", "把高電壓電芯的電充給低電壓電芯", "透過電阻將電壓較高的電芯能量以熱能形式消耗掉", "用水泵把電壓沖平", "這是「主動平衡」的作法，成本極高。", "正確！這也是為什麼平衡時 BMS 會發微熱的原因。", "水流無法影響電壓。", 2, "[電芯平衡] 被動平衡(Passive Balancing)是利用並聯在電芯上的放電電阻，將電壓較高之電芯能量轉化為熱能耗散，以對齊低壓電芯。");
    addQ("I55", "intermediate", "安裝準備", "Sec 8", "把電池鎖上車架時，發現其中一個鎖孔公差對不準，差了 5mm，該怎麼辦？", "用鐵鎚硬敲進去", "擴孔或調整車架支架，絕不能對電池箱施加硬應力變形", "不鎖那個孔，少一顆螺絲沒差", "硬敲會導致電池箱體變形破裂。", "正確！電池箱是精密結構，車架公差需在車端解決。", "少一顆會導致抗震能力下降。", 2, "[機械安裝] 電池系統安裝鎖固時嚴禁施加強迫應力(Forced Alignment)，若孔位不符應調整車身端支架。");
    addQ("I56", "intermediate", "管路材質", "Sec 8", "車端連接至 XM25 的冷卻水管，手冊強烈建議使用哪種材質？", "一般花園塑膠軟管", "EPDM橡膠或鐵氟龍等具備化學相容性的專用管材", "純銅管", "不耐溫也不耐壓。", "正確！必須確保不會被冷卻液腐蝕或溶出雜質。", "銅管太硬無法吸收車輛震動。", 2, "[管材規範] 外部循環管路必須使用與浸沒冷卻液具備高度化學相容性之材質(如特定配方之 EPDM 或 PTFE)，防老化洩漏。");
    addQ("I57", "intermediate", "絕緣量測", "Sec 10", "用兆歐錶量測絕緣時，若手指不小心碰到測試探針的裸露金屬，會怎樣？", "沒感覺", "會受到高達 500V 的強烈電擊", "電表會燒掉", "不可能沒感覺。", "正確！兆歐錶是透過輸出高壓直流來測漏電的。", "電表沒事，有事的是你。", 2, "[工安防護] 兆歐錶(Megger)在按下 Test 鍵時會輸出 500V~1000V 高壓，測試期間嚴禁觸碰探針金屬端或受測物裸露部位。");
    addQ("I58", "intermediate", "充放電", "Sec 9", "電池的「1C」充放電率是什麼意思？", "充 1 度的電", "以等同於電池額定容量的電流大小進行充放電(理論上1小時充/放完)", "代表 1 攝氏度", "度是能量單位 kWh。", "正確！例如 100Ah 電池，1C 就是 100A 電流。", "溫度的單位是 °C。", 2, "[名詞解釋] C-rate (充放電倍率) 用於衡量充放電電流大小。1C 代表電流安培數等於電池的安時(Ah)額定容量。");
    addQ("I59", "intermediate", "通訊排查", "Sec 9", "若 VCU 收到 BMS 傳來的 CAN 訊號中，某個訊號的數值一直固定在 0xFFFF，通常代表？", "電壓非常高", "BMS 判定該感測器無效(Invalid)或資料錯誤", "電池容量是滿的", "如果是真實數值不會剛好是這個十六進位極值。", "正確！在 J1939 或一般定義中，這通常是 Error Indicator。", "滿電 SOC 通常是 100%。", 2, "[CAN資料] 在標準車用通訊定義中，當數據顯示為 0xFF 或 0xFFFF 時，通常代表該訊號失效(Invalid)、未安裝或錯誤。");
    addQ("I60", "intermediate", "高壓接頭", "Sec 8", "連接高壓大電流的插頭(如 Amphenol 或 TE)時，通常會有一個 CPA 機構，那是什麼？", "認證會計師", "連接器位置保證 (Connector Position Assurance)，防止接頭鬆脫的二次鎖定", "冷卻幫浦助理", "這不是財報。", "正確！推入後還要把紅色或黃色的小卡榫推到底鎖定。", "這跟幫浦無關。", 2, "[接插件防護] 高壓連接器大多配備 CPA (二次鎖扣)，確保連接器在震動環境下不會意外退卻鬆脫。");
    addQ("I61", "intermediate", "維護環境", "Sec 4", "打開電池外箱周邊的維修蓋板時，如果環境濕度高達 90%，該如何處置？", "照常開啟", "暫停作業，或移至空調除濕房內進行，避免水氣封存在箱內", "拿吹風機往裡面吹", "封裝後水氣凝結會導致內部短路。", "正確！控制濕度是電池維修的鐵律。", "吹風機會吹入更多灰塵與雜質。", 2, "[開蓋規範] 任何涉及破壞系統氣密的維修作業，必須在相對濕度低於 50% 且無塵的溫控環境下進行。");
    addQ("I62", "intermediate", "冷卻液壽命", "Sec 8", "浸沒式冷卻液在正常使用下，通常需要多久更換一次？", "每個月換一次", "與電池系統同壽命(免更換)，除非受到外部污染或嚴重洩漏", "每次充電都要換", "這不是機油。", "正確！它是高度穩定的工程液，無須定期更換。", "這太誇張了。", 2, "[耗材維護] 浸沒式專用冷卻液具備極佳化學穩定性，正常密封運行狀態下與電池同壽命，為免維護設計。");
    addQ("I63", "intermediate", "防爆閥檢查", "Sec 8", "日常巡檢發現防爆閥(Vent)表面被厚重的泥巴覆蓋，會造成什麼影響？", "可以防震", "防爆閥失去透氣功能，箱體內外壓差過大可能導致外殼變形或漏液", "防爆閥變更強", "泥巴沒有防震效果。", "正確！它必須保持乾淨暢通才能「呼吸」。", "透氣孔堵死就失效了。", 2, "[防爆閥維護] 防爆閥(Pressure Vent)外部表面必須保持清潔暢通，若遭泥汙堵塞將失去平衡氣壓與緊急洩壓功能。");
    addQ("I64", "intermediate", "系統喚醒", "Sec 9", "「硬體喚醒(Hardware Wakeup)」通常是指給予 BMS 哪個腳位特定電壓來開機？", "CAN_H 腳位", "KL15 / IGN (點火開關) 腳位", "HV+ 高壓正極", "CAN 是通訊線。", "正確！這就像車鑰匙轉到 ON 的訊號。", "高壓不能直接用來喚醒低壓機板。", 2, "[喚醒邏輯] BMS 通常透過偵測特定的低壓硬體腳位 (如 Key-ON / KL15) 獲得高電位訊號來執行系統喚醒程序。");
    addQ("I65", "intermediate", "電氣隔離", "Sec 9", "電池箱內的高壓正極與負極，在斷電狀態下對箱體金屬外殼的電阻應該是？", "互相短路", "趨近於無限大 (極高阻抗)", "0 歐姆", "短路就爆炸了。", "正確！高壓系統必須與外殼完全電氣隔離 (Floating)。", "0歐姆代表嚴重漏電。", 2, "[絕緣設計] 車用高壓電池系統採用浮地(Floating)設計，正負極對外殼/底盤之間必須保持極高之絕緣阻抗。");
    addQ("I66", "intermediate", "熱管理邏輯", "Sec 9", "BMS 通常如何決定何時命令外部水泵全速運轉？", "水泵永遠全速運轉", "根據內部最高電芯溫度與冷卻液進水溫度的差值，透過軟體邏輯動態調整水泵轉速", "看駕駛踩油門多深", "浪費電且縮短泵浦壽命。", "正確！這就是熱管理系統(TMS)的精髓。", "油門深度是瞬態，溫度變化是緩態。", 2, "[熱管理控制] BMS 會依據當前電芯最高溫(T_max)與環境水溫，動態輸出 PWM 訊號控制外部水泵轉速以節能。");
    addQ("I67", "intermediate", "安裝準備", "Sec 8", "在安裝系統前，為何要核對電池銘牌上的 S/N 序號與出貨單是否一致？", "為了確認產品出廠年份，並確保韌體版本與客戶需求匹配", "為了參加抽獎", "因為手冊規定", "正確！不同批次的軟硬體配置可能略有不同。", "工業品不玩這套。", "要知道為何而規定。", 1, "[追溯管理] S/N (序號) 是系統唯一身分證，涉及保固、韌體版本與內部生產履歷，安裝前必須核對記錄。");
    addQ("I68", "intermediate", "管路排氣", "Sec 8", "管路排氣(Bleeding)作業若不徹底，最直接的症狀是什麼？", "電池電壓變低", "水泵運轉時發出巨大異音，且電池內部溫差(Delta T)變大", "通訊中斷", "電壓不會因為空氣變化。", "正確！氣穴通過泵浦葉片會產生噪音，空氣也會阻斷熱傳。", "空氣不影響 CAN 通訊。", 2, "[排氣不良徵兆] 循環管路若殘留空氣，將導致水泵氣穴(Cavitation)異音，並大幅降低系統熱傳導效率。");
    addQ("I69", "intermediate", "維護工安", "Sec 6", "工作人員若留長髮，在電池組裝區應如何處置？", "讓它自然飄逸", "必須將長髮盤起並收於工作帽內", "剪成短髮", "頭髮可能捲入風扇或遮蔽視線。", "正確！防止頭髮沾染化學品或阻礙高壓作業視線。", "盤起即可，不強制剪髮。", 2, "[人員服裝] 基於工業安全，作業人員之長髮必須確實綁束並收納於安全帽或工作帽內，嚴禁披散。");
    addQ("I70", "intermediate", "高壓下電", "Sec 9", "手冊要求的「安全放電等待時間」通常至少是多久？", "1 秒", "5 到 10 分鐘，確保內部電容完全放電至安全電壓(如60V以下)", "24 小時", "大電容放電沒這麼快。", "正確！這是用生命換來的安全守則。", "不用這麼久，影響維修效率。", 2, "[下電規範] 系統切斷高壓後，必須等待 5~10 分鐘讓內部 X/Y 電容被動放電完畢，並以儀表驗電後方可作業。");
    addQ("I71", "intermediate", "安全設計", "Sec 9", "維修保險栓 (MSD - Manual Service Disconnect) 的主要作用是？", "用來啟動電池", "在維修時手動拔除，強制從物理中央截斷高壓迴路，保障維修人員安全", "用來更換保險絲", "它是用來斷電的。", "正確！拔掉它，電池就從中間被切成兩半，電壓減半且無輸出。", "雖然它通常內含保險絲，但主要目的是安全物理斷路。", 2, "[維修開關] MSD 位於電池組高壓串聯迴路中間，維修前拔除可將系統高壓一分為二，提供實體斷電保護。");
    addQ("I72", "intermediate", "通訊排查", "Sec 9", "CAN 通訊線(CAN_H/CAN_L)建議採用什麼樣的線材結構？", "雙絞線 (Twisted Pair)，最好有屏蔽層", "兩條平行的粗銅線", "單芯線", "正確！雙絞線能有效抵消共模干擾。", "平行線極易受馬達高頻雜訊干擾。", "單芯線無法抗干擾。", 1, "[線材規範] CAN 匯流排必須使用阻抗匹配之「屏蔽雙絞線」，以抵抗車聯環境中強烈的電磁干擾(EMI)。");
    addQ("I73", "intermediate", "預充邏輯", "Sec 9", "如果負載端(如馬達控制器)內部的電容非常大，對預充階段有何影響？", "沒影響", "預充時間會拉長，甚至可能超過 BMS 設定的 Timeout 時間導致報錯", "預充會變快", "電容越大，充飽所需的時間越長。", "正確！大水缸要花更多時間注水。", "物理定律不允許變快。", 2, "[系統匹配] 負載端(Inverter)的總電容量若超過 BMS 預設值，會導致預充電壓爬升過慢而觸發逾時故障(Timeout)。");
    addQ("I74", "intermediate", "高壓連接", "Sec 9", "鎖固高壓端子時，為何螺絲與銅排之間不應該塗抹絕緣膠？", "因為膠很貴", "因為端子接合面必須保持金屬直接接觸，絕緣膠會造成接觸不良而發熱", "塗了顏色不好看", "這不是成本問題。", "正確！電流必須無阻礙地通過接觸面。", "不是外觀考量。", 2, "[端子鎖固] 高壓導電接觸面必須保持絕對清潔與金屬裸露，任何絕緣異物(含漆、膠)都會導致致命的高接觸電阻。");

        let addedCount = 0;
        let cycle = 1;

        while (basePool.length + addedCount < target) {
            const seedQ = basePool[addedCount % basePool.length];
            const newQ = JSON.parse(JSON.stringify(seedQ)); 
            
            newQ.id = `${newQ.id}_v${cycle}`;
            newQ.scene = `(廠區測驗代號 #${cycle}${addedCount}) ` + newQ.scene; 
            
            questionDB.push(newQ);
            addedCount++;
            
            if (addedCount % basePool.length === 0) {
                cycle++;
            }
        }
    });

    /**
     * ==========================================
     * 遊戲狀態與邏輯 (Game State & Logic)
     * ==========================================
     */
    const stages = [
        { id: 'beginner', name: '🟢 新手任務 (Beginner)', color: 'var(--beginner)' },
        { id: 'intermediate', name: '🟡 進階操作 (Intermediate)', color: 'var(--intermediate)' },
        { id: 'advanced', name: '🔴 實戰模擬 (Advanced)', color: 'var(--advanced)' }
    ];

    // 每局遊戲隨機抽取的總題數
    const TOTAL_DRAW = 9; 

    let gameState = {
        questionQueue: [],
        currentQIndex: 0,
        score: 0,
        maxPossibleScore: 0,
        startTime: null,
        currentAttempt: 0,
        coveredTopics: new Set(),
        weakTopics: new Set(),
        weakSummaries: []
    };

    const screens = {
        start: document.getElementById('start-screen'),
        game: document.getElementById('game-screen'),
        end: document.getElementById('end-screen')
    };

    function showScreen(screenName) {
        Object.values(screens).forEach(s => s.classList.remove('active'));
        screens[screenName].classList.add('active');
    }

    function shuffleArray(array) {
        const arr = [...array];
        for (let i = arr.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [arr[i], arr[j]] = [arr[j], arr[i]];
        }
        return arr;
    }

    function startGame() {
        gameState.score = 0;
        gameState.currentQIndex = 0;
        gameState.startTime = new Date();
        gameState.coveredTopics.clear();
        gameState.weakTopics.clear();
        gameState.weakSummaries = [];
        gameState.questionQueue = [];

        // 核心抽題邏輯：將全部 720 題打亂後，不分難度直接隨機抽取 9 題
        const shuffledAll = shuffleArray(questionDB).slice(0, TOTAL_DRAW);
        
        shuffledAll.forEach(q => {
            const stage = stages.find(s => s.id === q.difficulty);
            gameState.questionQueue.push({ ...q, stageInfo: stage });
        });

        gameState.maxPossibleScore = gameState.questionQueue.length * 2;
        document.getElementById('score-val').innerText = '0';
        
        showScreen('game');
        loadQuestion();
    }

    function loadQuestion() {
        if (gameState.currentQIndex >= gameState.questionQueue.length) {
            endGame();
            return;
        }

        const q = gameState.questionQueue[gameState.currentQIndex];
        gameState.currentAttempt = 0;

        document.getElementById('stage-indicator').innerText = `${q.stageInfo.name} (第 ${gameState.currentQIndex + 1}/${gameState.questionQueue.length} 題)`;
        document.getElementById('stage-indicator').style.backgroundColor = q.stageInfo.color;
        document.getElementById('stage-indicator').style.color = q.stageInfo.id === 'intermediate' ? '#000' : '#fff';

        const progressPct = (gameState.currentQIndex / gameState.questionQueue.length) * 100;
        document.getElementById('progress-bar').style.width = `${progressPct}%`;

        document.getElementById('scene-text').innerHTML = `<strong>【情境】</strong><br>${q.scene}`;

        const feedbackArea = document.getElementById('feedback-area');
        feedbackArea.className = 'feedback-container';
        feedbackArea.classList.remove('show');
        document.getElementById('knowledge-summary').style.display = 'none';

        const choicesArea = document.getElementById('choices-area');
        choicesArea.innerHTML = '';
        
        const shuffledChoices = shuffleArray(q.choices);

        shuffledChoices.forEach((choice) => {
            const btn = document.createElement('button');
            btn.className = 'choice-btn';
            btn.innerText = choice.text;
            btn.onclick = () => handleAnswer(choice, btn);
            choicesArea.appendChild(btn);
        });
    }

    function handleAnswer(choice, btnElement) {
        const q = gameState.questionQueue[gameState.currentQIndex];
        const buttons = document.querySelectorAll('.choice-btn');
        const feedbackArea = document.getElementById('feedback-area');
        const feedbackTitle = document.getElementById('feedback-title');
        const feedbackText = document.getElementById('feedback-text');
        const summaryArea = document.getElementById('knowledge-summary');

        if (choice.correct) {
            btnElement.classList.add('correct');
            buttons.forEach(b => b.disabled = true);
            
            feedbackArea.className = 'feedback-container success show';
            feedbackTitle.innerText = '✅ 判斷正確！';
            feedbackText.innerText = choice.feedback;
            
            summaryArea.innerText = q.knowledgeSummary;
            summaryArea.style.display = 'block';

            if (gameState.currentAttempt === 0) gameState.score += 2;
            else { gameState.score += 1; gameState.weakTopics.add(q.topic); }
            
            gameState.coveredTopics.add(q.topic);
            document.getElementById('score-val').innerText = gameState.score;

        } else {
            gameState.currentAttempt++;
            btnElement.classList.add('wrong');
            btnElement.disabled = true;

            if (gameState.currentAttempt === 1) {
                feedbackArea.className = 'feedback-container hint show';
                feedbackTitle.innerText = '💡 前輩提示';
                feedbackText.innerText = choice.feedback;
            } else {
                buttons.forEach(b => b.disabled = true);
                buttons.forEach(b => {
                    if (q.choices.find(c => c.text === b.innerText)?.correct) b.classList.add('correct');
                });

                feedbackArea.className = 'feedback-container fail show';
                feedbackTitle.innerText = '❌ 決策失誤！';
                feedbackText.innerText = '前輩指導：這題你沒掌握到喔，請務必把下面的文件規定記熟！';
                
                summaryArea.innerText = q.knowledgeSummary;
                summaryArea.style.display = 'block';

                gameState.weakTopics.add(q.topic);
                gameState.coveredTopics.add(q.topic);

                if (!gameState.weakSummaries.find(w => w.topic === q.topic)) {
                    gameState.weakSummaries.push({ topic: q.topic, summary: q.knowledgeSummary });
                }
            }
        }
    }

    function nextQuestion() {
        gameState.currentQIndex++;
        loadQuestion();
    }

    function endGame() {
        const endTime = new Date();
        const diffMs = endTime - gameState.startTime;
        const diffMins = Math.floor(diffMs / 60000);
        const diffSecs = Math.floor((diffMs % 60000) / 1000);
        
        document.getElementById('end-score').innerText = gameState.score;
        document.getElementById('max-score').innerText = gameState.maxPossibleScore;
        document.getElementById('end-time').innerText = `${diffMins.toString().padStart(2, '0')}:${diffSecs.toString().padStart(2, '0')}`;
        
        const tagsArea = document.getElementById('topic-tags-area');
        tagsArea.innerHTML = '';
        
        // 僅顯示本局抽到的主題標籤
        gameState.coveredTopics.forEach(topic => {
            const span = document.createElement('span');
            span.className = 'topic-tag';
            if (gameState.weakTopics.has(topic)) {
                span.classList.add('weak');
                span.innerText = `⚠️ ${topic}`;
            } else {
                span.classList.add('covered');
                span.innerText = `✅ ${topic}`;
            }
            tagsArea.appendChild(span);
        });

        const reviewArea = document.getElementById('review-area');
        const reviewContent = document.getElementById('review-content');
        if (gameState.weakSummaries.length > 0) {
            reviewArea.style.display = 'block';
            reviewContent.innerHTML = '';
            gameState.weakSummaries.forEach(item => {
                const div = document.createElement('div');
                div.className = 'review-item';
                div.innerHTML = `<strong>【${item.topic}】</strong><br>${item.summary}`;
                reviewContent.appendChild(div);
            });
        } else {
            reviewArea.style.display = 'none';
        }

        showScreen('end');
    }

</script>
</body>
